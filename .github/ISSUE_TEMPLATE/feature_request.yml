name: Feature Request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make DropNote better? Tell us what you're trying to do.

  - type: checkboxes
    id: checks
    attributes:
      label: Before you start
      options:
        - label: I searched existing issues and this hasn't been suggested yet
          required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or what you're missing today.
      placeholder: I often need to ... but DropNote doesn't let me ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've thought about. Optional.
    validations:
      required: false
